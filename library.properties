name=RF24StageLink
version=0.5.0
author=bonjurroughs
maintainer=bonjurroughs <bonjurroughs@gmail.com>
sentence=Frequency-hopping USB-MIDI broadcast over nRF24L01(+), with a FastLED animation engine.
paragraph=One master reads live USB-MIDI and broadcasts it to many listening fixtures. Master and fixtures hop through the same channel list in lockstep (FHSS) to ride out 2.4GHz interference. Simple, no-ACK one-to-many broadcast; fixtures get the whole MIDI stream via callbacks. An optional FastLED animation engine (SLAnimator) maps MIDI notes to up to 127 animation slots, CC to live parameters, and beat-syncs every fixture by riding tempo+phase in the hop beacon - no MIDI clock spam on the air. The animation engine needs FastLED; the core transport does not. Cross-platform; layered on the RF24 library (does not modify it).
category=Communication
url=https://github.com/bonjurroughs/RF24StageLink
architectures=*
